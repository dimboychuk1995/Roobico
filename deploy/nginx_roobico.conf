############################################################
# Roobico — split between two hosts:
#   roobico.com / www.roobico.com  → public host (login, forgot/reset password)
#   app.roobico.com                → application host (dashboard, customer
#                                    portal, all internal pages)
#
# Both hosts proxy to the same gunicorn socket. Flask decides what to do
# with the request based on the Host header (see PUBLIC_HOST_ENDPOINTS in
# app/__init__.py).
############################################################

# ── Shared proxy settings ────────────────────────────────────────────────
# (kept inline rather than in a `map` so this file stays self-contained)

# ── HTTP (port 80): redirect everything to HTTPS ─────────────────────────
server {
    listen 80;
    server_name roobico.com www.roobico.com app.roobico.com 198.199.122.49;

    # Allow ACME http-01 challenge for certbot.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: public host (login only) ──────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name roobico.com www.roobico.com;

    ssl_certificate     /etc/letsencrypt/live/roobico.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/roobico.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 16M;

    location / {
        proxy_pass http://unix:/home/deploy/Roobico/roobico.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Flask flash messages live in the session cookie, so redirect
        # responses can carry large Set-Cookie headers. Default 4k/8k
        # buffers cause sporadic 502s ("upstream sent too big header")
        # on POSTs like /work_orders/create and /work_orders/units/create.
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_connect_timeout   75s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;
    }

    location /static {
        alias /home/deploy/Roobico/app/static;
        expires off;
        etag on;
        if_modified_since exact;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}

# ── HTTPS: application host ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.roobico.com;

    ssl_certificate     /etc/letsencrypt/live/app.roobico.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.roobico.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 16M;

    location / {
        proxy_pass http://unix:/home/deploy/Roobico/roobico.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_connect_timeout   75s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;
    }

    location /static {
        alias /home/deploy/Roobico/app/static;
        expires off;
        etag on;
        if_modified_since exact;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}

# ── HTTPS: bare-IP access — keep working but redirect to public host ─────
server {
    listen 443 ssl http2;
    server_name 198.199.122.49;

    ssl_certificate     /etc/letsencrypt/live/roobico.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/roobico.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://roobico.com$request_uri;
}

