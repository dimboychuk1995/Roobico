# Roobico — Cloudflare-fronted setup.
#
# TLS is terminated at Cloudflare. Origin (this host) listens on :80
# only and trusts the Host header to decide which Flask code path to
# serve:
#   roobico.com / www.roobico.com → public host (login, forgot/reset)
#   app.roobico.com               → application host (dashboard, etc.)
# Both server blocks proxy to the same gunicorn socket; the host split
# is enforced inside Flask (see app/__init__.py PUBLIC_HOST_ENDPOINTS).
#
# Make sure both subdomains have an A-record → 198.199.122.49 with
# Cloudflare proxy (orange cloud) enabled, otherwise Cloudflare won't
# present a TLS cert for app.roobico.com.

# ── Public host (login / forgot / reset) ─────────────────────────────────
server {
    listen 80;
    server_name roobico.com www.roobico.com 198.199.122.49;

    client_max_body_size 16M;

    location / {
        proxy_pass http://unix:/home/deploy/Roobico/roobico.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare terminates TLS; trust its X-Forwarded-Proto header.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Flask flash messages live in the session cookie, so redirect
        # responses can carry large Set-Cookie headers. Default 4k/8k
        # buffers cause sporadic 502s ("upstream sent too big header")
        # on POSTs like /work_orders/create and /work_orders/units/create.
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_connect_timeout   75s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;
    }

    location /static {
        alias /home/deploy/Roobico/app/static;
        expires off;
        etag on;
        if_modified_since exact;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}

# ── Application host (dashboard, customer portal, internal pages) ────────
server {
    listen 80;
    server_name app.roobico.com;

    client_max_body_size 16M;

    location / {
        proxy_pass http://unix:/home/deploy/Roobico/roobico.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_connect_timeout   75s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;
    }

    location /static {
        alias /home/deploy/Roobico/app/static;
        expires off;
        etag on;
        if_modified_since exact;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}
