server {
    listen 80;
    server_name roobico.com www.roobico.com 198.199.122.49;

    client_max_body_size 16M;

    location / {
        proxy_pass http://unix:/home/deploy/Roobico/roobico.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Flask flash messages live in the session cookie, so redirect
        # responses can carry large Set-Cookie headers. Default 4k/8k
        # buffers cause sporadic 502s ("upstream sent too big header")
        # on POSTs like /work_orders/create and /work_orders/units/create.
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_connect_timeout   75s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;
    }

    location /static {
        alias /home/deploy/Roobico/app/static;
        # Do not cache aggressively: browsers must revalidate each request
        # so that updated CSS/JS are picked up immediately after deploy.
        # nginx still serves ETag / Last-Modified, so unchanged assets
        # return 304 Not Modified and stay cheap.
        expires off;
        etag on;
        if_modified_since exact;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}
