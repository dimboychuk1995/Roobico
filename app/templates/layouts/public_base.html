<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Auth{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/public.css', v='20260414-layout') }}">
  <style>
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
      scroll-behavior: auto !important;
    }
    .tab-content > .tab-pane {
      transition: none !important;
      animation: none !important;
      transform: none !important;
    }
    .nav-tabs .nav-link {
      transition: none !important;
    }
  </style>
  {% block extra_styles %}{% endblock %}

</head>
<body class="public-shell" data-app-timezone="{{ app_timezone or 'UTC' }}">
  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/public.js', v='20260317-preset-range-sync') }}"></script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    window.appConfirm = function (message, opts) {
      if (typeof Swal === 'undefined') { return Promise.resolve(window.confirm(message)); }
      opts = opts || {};
      var noAnim = { popup: '', backdrop: '' };
      return Swal.fire({
        title: opts.title || message,
        text: opts.title ? message : undefined,
        icon: opts.icon || 'warning',
        showCancelButton: true,
        confirmButtonText: opts.confirmText || 'Yes',
        cancelButtonText: opts.cancelText || 'Cancel',
        confirmButtonColor: opts.confirmColor || '#c43b3b',
        cancelButtonColor: '#6c757d',
        showClass: noAnim,
        hideClass: noAnim,
      }).then(function (result) { return result.isConfirmed; });
    };

    window.appAlert = function (message, type) {
      if (typeof Swal === 'undefined') { window.alert(message); return; }
      type = type || 'info';
      var noAnim = { popup: '', backdrop: '' };
      var btnColors = { success: '#1a7a42', error: '#c43b3b', warning: '#c48a1a', info: '#1a7a42' };
      if (type === 'success') {
        Swal.fire({
          toast: true,
          position: 'bottom-end',
          icon: 'success',
          iconColor: '#1a7a42',
          title: message,
          showConfirmButton: false,
          timer: 3500,
          timerProgressBar: true,
          showClass: noAnim,
          hideClass: noAnim,
        });
      } else {
        Swal.fire({
          icon: type,
          title: message,
          confirmButtonColor: btnColors[type] || '#1a7a42',
          showClass: noAnim,
          hideClass: noAnim,
        });
      }
    };
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
