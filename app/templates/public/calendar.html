{% extends "layouts/app_base.html" %}

{% block page_title %}Calendar{% endblock %}

{% block extra_styles %}
  {{ super() }}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar.css', v='20260408-v4') }}">
{% endblock %}

{% block app_content %}
<div class="cal-toolbar d-flex align-items-center justify-content-between mb-2">
  <div class="d-flex align-items-center gap-2">
    <button type="button" class="btn btn-outline-secondary btn-sm" id="calPrev" title="Previous week">
      <span aria-hidden="true">&#x2039;</span>
    </button>
    <button type="button" class="btn btn-outline-secondary btn-sm" id="calToday">Today</button>
    <button type="button" class="btn btn-outline-secondary btn-sm" id="calNext" title="Next week">
      <span aria-hidden="true">&#x203A;</span>
    </button>
  </div>
  <h5 class="cal-title mb-0" id="calTitle"></h5>
  <div style="min-width:120px" class="text-end">
    <button type="button" class="btn btn-outline-secondary btn-sm" id="calSettingsBtn" title="Settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
        <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.434-.901 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.892-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
      </svg>
    </button>
  </div>
</div>

<div id="calWeekContainer"></div>

<!-- Settings Modal -->
<div class="modal fade" id="calSettingsModal" tabindex="-1" aria-labelledby="calSettingsModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="calSettingsModalLabel">Calendar Settings</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <h6 class="mb-3">Appointment Statuses</h6>
        <div id="settingsStatusList"></div>
        <button type="button" class="btn btn-outline-secondary btn-sm mt-2" id="settingsAddStatus">
          + Add Status
        </button>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="settingsSaveBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Appointment Modal -->
<div class="modal fade" id="appointmentModal" tabindex="-1" aria-labelledby="appointmentModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="appointmentModalLabel">New Appointment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="apptEventId" value="">

        <div class="mb-3">
          <label class="form-label">Customer</label>
          <select class="form-select" id="apptCustomer">
            <option value="">— New Customer —</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Unit</label>
          <select class="form-select" id="apptUnit" disabled>
            <option value="">— New Unit —</option>
          </select>
        </div>

        <input type="hidden" id="apptDate" value="">

        <div class="row mb-3">
          <div class="col-6">
            <label class="form-label">Start</label>
            <select class="form-select" id="apptStart"></select>
          </div>
          <div class="col-6">
            <label class="form-label">End</label>
            <select class="form-select" id="apptEnd"></select>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Assign to Mechanic</label>
          <select class="form-select" id="apptMechanic">
            <option value="">— None —</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Status</label>
          <div id="apptStatusGroup" class="d-flex gap-2 flex-wrap"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">Title / Note</label>
          <input type="text" class="form-control" id="apptTitle" placeholder="Optional">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-danger me-auto d-none" id="apptDeleteBtn">Delete</button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="apptSaveBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/calendar/calendar.js', v='20260408-v4') }}"></script>
{% endblock %}
