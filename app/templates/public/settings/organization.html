{% extends "layouts/app_base.html" %}
{% block page_title %}Settings — Organization{% endblock %}

{% block app_content %}
<div class="text-center mb-3">
    <h1 class="h4 mb-1">Organization</h1>
    <p class="text-muted mb-0">Company profile, contacts, and preferences.</p>
</div>
<div class="d-flex justify-content-end mb-3">
  <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('main.settings') }}">Back to Settings</a>
</div>

<form id="orgForm" autocomplete="off">
<div class="row g-3">
  <!-- Left column -->
  <div class="col-12 col-lg-7">

    <!-- Company details -->
    <div class="card">
      <div class="card-header fw-semibold">Company Details</div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label">Company Name</label>
            <input type="text" class="form-control" name="name" value="{{ org.name or '' }}">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Legal Name</label>
            <input type="text" class="form-control" name="legal_name" value="{{ org.legal_name or '' }}">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">DOT / MC</label>
            <input type="text" class="form-control" name="dot_mc" value="{{ org.dot_mc or '' }}">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Tax ID / EIN</label>
            <input type="text" class="form-control" name="tax_id" value="{{ org.tax_id or '' }}">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" name="phone" value="{{ org.phone or '' }}">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" value="{{ org.email or '' }}">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Website</label>
            <input type="url" class="form-control" name="website" value="{{ org.website or '' }}" placeholder="https://">
          </div>
          <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea class="form-control" name="notes" rows="3">{{ org.notes or '' }}</textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Address -->
    <div class="card mt-3">
      <div class="card-header fw-semibold">Address</div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Street Address</label>
            <input type="text" class="form-control" name="address" value="{{ org.address or '' }}">
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">City</label>
            <input type="text" class="form-control" name="city" value="{{ org.city or '' }}">
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">State</label>
            <input type="text" class="form-control" name="state" value="{{ org.state or '' }}">
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">ZIP</label>
            <input type="text" class="form-control" name="zip" value="{{ org.zip or '' }}">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Country</label>
            <input type="text" class="form-control" name="country" value="{{ org.country or '' }}">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Timezone</label>
            <input type="text" class="form-control" name="timezone" value="{{ org.timezone or '' }}" placeholder="America/Chicago">
          </div>
        </div>
      </div>
    </div>

    <!-- Billing -->
    <div class="card mt-3">
      <div class="card-header fw-semibold">Billing</div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label">Billing Email</label>
            <input type="email" class="form-control" name="billing_email" value="{{ org.billing_email or '' }}">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Billing Phone</label>
            <input type="text" class="form-control" name="billing_phone" value="{{ org.billing_phone or '' }}">
          </div>
          <div class="col-12">
            <label class="form-label">Billing Address</label>
            <textarea class="form-control" name="billing_address" rows="2">{{ org.billing_address or '' }}</textarea>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right column -->
  <div class="col-12 col-lg-5">

    <!-- Primary contact -->
    <div class="card">
      <div class="card-header fw-semibold">Primary Contact</div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Contact Person</label>
            <input type="text" class="form-control" name="contact_name" value="{{ org.contact_name or '' }}">
          </div>
          <div class="col-12">
            <label class="form-label">Contact Email</label>
            <input type="email" class="form-control" name="contact_email" value="{{ org.contact_email or '' }}">
          </div>
          <div class="col-12">
            <label class="form-label">Contact Phone</label>
            <input type="text" class="form-control" name="contact_phone" value="{{ org.contact_phone or '' }}">
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="mt-3">
  <button type="submit" class="btn btn-primary" id="orgSaveBtn">Save Changes</button>
  <span class="text-success ms-2 d-none" id="orgSaveOk">Saved!</span>
  <span class="text-danger ms-2 d-none" id="orgSaveErr"></span>
</div>
</form>

<script>
(function () {
  var form = document.getElementById("orgForm");
  if (!form) return;

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var btn = document.getElementById("orgSaveBtn");
    var okMsg = document.getElementById("orgSaveOk");
    var errMsg = document.getElementById("orgSaveErr");
    okMsg.classList.add("d-none");
    errMsg.classList.add("d-none");
    btn.disabled = true;
    btn.textContent = "Saving…";

    var fd = new FormData(form);
    var payload = {};
    fd.forEach(function (val, key) { payload[key] = val; });

    fetch("{{ url_for('main.settings_organization_save') }}", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        btn.disabled = false;
        btn.textContent = "Save Changes";
        if (data.ok) {
          okMsg.classList.remove("d-none");
          setTimeout(function () { okMsg.classList.add("d-none"); }, 3000);
        } else {
          errMsg.textContent = data.error || "Save failed.";
          errMsg.classList.remove("d-none");
        }
      })
      .catch(function () {
        btn.disabled = false;
        btn.textContent = "Save Changes";
        errMsg.textContent = "Network error.";
        errMsg.classList.remove("d-none");
      });
  });
})();
</script>
{% endblock %}
