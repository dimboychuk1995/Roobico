<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roobico — Admin</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      text-align: center;
      max-width: 420px;
    }
    h1 {
      margin: 0 0 .5rem 0;
      font-size: 1.75rem;
      letter-spacing: .03em;
    }
    .badge {
      display: inline-block;
      background: #16a34a;
      color: #fff;
      padding: .25rem .6rem;
      border-radius: 999px;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    p {
      color: #94a3b8;
      font-size: .95rem;
      line-height: 1.5;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Admin</div>
    <h1>Roobico Admin Panel</h1>
    <p>Skeleton is up. Login &amp; features will be added in the next steps.</p>
  </div>
</body>
</html>
